kind = "web"
previewPath = "/"
title = "WhatsApp AI Agent"
version = "1.0.0"
id = "artifacts/whatsapp-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23366

[services.development]
run = "pnpm --filter @workspace/whatsapp-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whatsapp-agent", "run", "build" ]
publicDir = "artifacts/whatsapp-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23366"
BASE_PATH = "/"
